<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generative VJ Cyber Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Exo+2:wght@500;700&family=Fira+Code:wght@400;500;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Orbitron:wght@400;500;700&family=Saira+Condensed:wght@500;700&family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <style>
    body { margin: 0; min-height: 100vh; background: #05060c; color: #e6eef8; font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }
    .marquee { overflow: hidden; position: relative; white-space: nowrap; max-width: 100%; }
    .marquee span { display: inline-block; padding-left: 100%; animation: marquee 20s linear infinite; }
    .marquee span.short { animation-duration: 14s; }
    #root { min-height: 100vh; }
    .glass-panel { background: rgba(8, 10, 18, 0.85); backdrop-filter: blur(18px); border: 1px solid rgba(94, 255, 169, 0.08); }
    .panel-label { letter-spacing: 0.22em; font-size: 0.72rem; color: rgba(169, 255, 171, 0.62); }
    .control-heading { color: #8ef0ff; letter-spacing: 0.16em; font-size: 0.78rem; text-transform: uppercase; }
    .icon-pill { width: 1.4rem; height: 1.4rem; display: inline-flex; align-items: center; justify-content: center; border-radius: 0.55rem; background: rgba(3, 12, 20, 0.8); }
    .hidden-ui { opacity: 0; pointer-events: none; transition: opacity .35s ease; }
    .show-ui { opacity: 1; transition: opacity .35s ease; }
    .logo-drop { position: relative; border: 1px dashed rgba(94,255,169,0.35); }
    .logo-drop:hover { background: rgba(94,255,169,0.04); }
    .logo-drop input { position: absolute; inset: 0; cursor: pointer; opacity: 0; }
    .marquee { overflow: hidden; position: relative; white-space: nowrap; }
    .marquee span { display: inline-block; padding-left: 100%; animation: marquee 20s linear infinite; }
    @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
    .vhs-noise { mix-blend-mode: overlay; opacity: .18; }
    .strobe-flash { position: absolute; inset: 0; pointer-events: none; background: rgba(255,255,255,0.08); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/javascript">
    const { useState, useEffect, useRef } = React;

    const DEFAULT_PRESETS = [
      { label: 'SPARK', settings: null },
      { label: 'WARP', settings: null },
      { label: 'NIGHT', settings: null }
    ];

    function openLogoDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open('vj-cyberdb', 1);
        request.onupgradeneeded = () => {
          const db = request.result;
          if (!db.objectStoreNames.contains('assets')) {
            db.createObjectStore('assets');
          }
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    async function saveLogoImage(dataUrl) {
      const db = await openLogoDB();
      const tx = db.transaction('assets', 'readwrite');
      tx.objectStore('assets').put(dataUrl, 'logo');
      return tx.complete;
    }

    async function loadLogoImage() {
      const db = await openLogoDB();
      return new Promise((resolve) => {
        const tx = db.transaction('assets', 'readonly');
        const request = tx.objectStore('assets').get('logo');
        request.onsuccess = () => resolve(request.result || null);
        request.onerror = () => resolve(null);
      });
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    const SAMPLE_RATE = 44100;
    const BAND_RANGES = {
      bass: [20, 150],
      mid: [150, 2000],
      high: [2000, 20000]
    };

    function averageFrequency(data, sampleRate, startHz, endHz) {
      const binCount = data.length;
      const nyquist = sampleRate / 2;
      const startIndex = Math.floor((startHz / nyquist) * binCount);
      const endIndex = Math.min(binCount - 1, Math.floor((endHz / nyquist) * binCount));
      let sum = 0;
      let count = 0;
      for (let i = startIndex; i <= endIndex; i += 1) {
        sum += data[i];
        count += 1;
      }
      return count ? sum / count / 255 : 0;
    }

    function App() {
      const canvasRef = useRef(null);
      const audioRef = useRef(null);
      const videoRef = useRef(null);
      const animationRef = useRef(null);
      const audioContextRef = useRef(null);
      const analyserRef = useRef(null);
      const sourceRef = useRef(null);
      const dataRef = useRef(null);
      const bandStateRef = useRef({ bass: 0, mid: 0, high: 0 });
      const lastFrameRef = useRef(0);
      const lastBpmTapRef = useRef([]);
      const fpsTimerRef = useRef(0);
      const [uiVisible, setUiVisible] = useState(true);
      const [paused, setPaused] = useState(false);
      const [fullscreen, setFullscreen] = useState(false);
      const [selectedStyle, setSelectedStyle] = useState('Hypnotic Tunnel');
      const [activeEffects, setActiveEffects] = useState({ aberration: true, vhs: true, strobe: false, scanlines: true, vignette: true, noise: false, pulse: true });
      const [animationSettings, setAnimationSettings] = useState({ tickerWave: true, titlePulse: true, logoPulse: true, backgroundDrift: true });
      const [selectedFont, setSelectedFont] = useState('Orbitron');
      const [soundCloudUrl, setSoundCloudUrl] = useState('');
      const [selectedScheme, setSelectedScheme] = useState('Cyber');
      const [frameRate, setFrameRate] = useState(60);
      const [trackTicker, setTrackTicker] = useState('LIVE FROM THE UNDERGROUND // MIX 042');
      const [currentTrack, setCurrentTrack] = useState('UNKNOWN PROJECTION SET');
      const [logoData, setLogoData] = useState(null);
      const [logoMeta, setLogoMeta] = useState({ scale: 0.9, opacity: 0.84, x: 0, y: 0, glitch: true, glow: true, glowColor: '#5bf18e', glowSize: 20, shape: 'normal', autoHide: false });
      const [showQr, setShowQr] = useState(false);
      const [qrUrl, setQrUrl] = useState('');
      const [scOverlayVisible, setScOverlayVisible] = useState(false);
      const [scOverlayPosition, setScOverlayPosition] = useState('bottom-right');
      const [audioMode, setAudioMode] = useState('microphone');
      const [audioFileUrl, setAudioFileUrl] = useState('');
      const [audioUrl, setAudioUrl] = useState('');
      const [videoFileUrl, setVideoFileUrl] = useState('');
      const [videoFileName, setVideoFileName] = useState('');
      const [backgroundImageUrl, setBackgroundImageUrl] = useState('');
      const [backgroundImageName, setBackgroundImageName] = useState('');
      const [bandSettings, setBandSettings] = useState({ bass: 1.4, mid: 1.0, high: 1.2, bassSmooth: true, midSmooth: true, highSmooth: true });
      const videoObjectUrlRef = useRef(null);
      const imageObjectUrlRef = useRef(null);
      const backgroundImageRef = useRef(null);
      const [dispBandLevels, setDispBandLevels] = useState({ bass: 0, mid: 0, high: 0 });
      const [bpmState, setBpmState] = useState({ bpm: 128, lastTap: null, autoStrobe: false });
      const [strobeStrength, setStrobeStrength] = useState(0.5);
      const [fxParams, setFxParams] = useState({ aberrationIntensity: 1.0, vhsAmount: 0.8, noiseAmount: 0.6, pulseScale: 1.0 });
      const [presets, setPresets] = useState(DEFAULT_PRESETS);
      const [status, setStatus] = useState('READY // hook audio, load logo, and launch the dashboard.');
      const [themeAccent, setThemeAccent] = useState('toxic-green');
      const [externalVideoSource, setExternalVideoSource] = useState('');
      const [logoDropActive, setLogoDropActive] = useState(false);
      const [confirmModal, setConfirmModal] = useState({ show: false, message: '', resolver: null });
      const [modalDontAsk, setModalDontAsk] = useState(false);

      const askUserConfirm = (message) => {
        try {
          const pref = localStorage.getItem('scCoverPref');
          if (pref === 'allow') return Promise.resolve(true);
          if (pref === 'deny') return Promise.resolve(false);
        } catch (e) {}
        return new Promise((resolve) => {
          setModalDontAsk(false);
          setConfirmModal({ show: true, message, resolver: resolve });
        });
      };

      const resolveConfirmModal = (accepted) => {
        try {
          if (modalDontAsk) {
            localStorage.setItem('scCoverPref', accepted ? 'allow' : 'deny');
          }
        } catch (e) {}
        if (confirmModal && typeof confirmModal.resolver === 'function') confirmModal.resolver(accepted);
        setConfirmModal({ show: false, message: '', resolver: null });
      };

      const styleOptions = ['Hypnotic Tunnel', 'Cyber Grid', 'Particle Swarm', 'Neon Circuit', 'Hologram Plexus', 'Radial Flux', 'Pulse Matrix', 'Audio Rings', 'Chromatic Burst', 'Vertex Storm', 'Laser Grid', 'Digital Mesh', 'Meta Vortex', 'Spectrum Web', 'Data Cascade', 'External Media'];
      const styleDescriptions = {
        'Hypnotic Tunnel': 'Infinite vortex with geometric distortion',
        'Cyber Grid': 'Retro synth floor with horizon pitch',
        'Particle Swarm': 'Dust field driven by high frequencies',
        'Neon Circuit': 'Electric trace network with glowing nodes',
        'Hologram Plexus': 'Triangular hologram mesh in 3D space',
        'Radial Flux': 'Radiating energy beams from the center',
        'Pulse Matrix': 'Vertical pulse columns synced to bass',
        'Audio Rings': 'Concentric rings driven by the spectrum',
        'Chromatic Burst': 'Spectral shards with color bloom',
        'Vertex Storm': 'Flying vertices and geometric shards',
        'Laser Grid': 'Neon laser beams on a synthetic grid',
        'Digital Mesh': 'Pixel mesh with data-noise intensity',
        'Meta Vortex': 'Cosmic vortex with layered depth',
        'Spectrum Web': 'Radial web of spectrum lines',
        'Data Cascade': 'Falling data streams like matrix rain',
        'External Media': 'Upload or stream a looped video'
      };
      const fontOptions = ['Inter', 'Orbitron', 'Exo 2', 'Saira Condensed', 'Audiowide', 'Fira Code', 'JetBrains Mono', 'VT323', 'Share Tech Mono'];
      const scOverlayPositions = {
        'bottom-right': { right: '1rem', bottom: '1rem', left: 'auto', top: 'auto' },
        'top-right': { right: '1rem', top: '1rem', left: 'auto', bottom: 'auto' },
        'bottom-left': { left: '1rem', bottom: '1rem', right: 'auto', top: 'auto' }
      };
      const getScPlayerStyle = () => ({
        position: 'absolute',
        width: '20rem',
        height: '6rem',
        zIndex: 40,
        borderRadius: '1rem',
        overflow: 'hidden',
        opacity: scOverlayVisible ? 1 : 0,
        transform: scOverlayVisible ? 'translateY(0)' : 'translateY(12px)',
        transition: 'opacity 0.5s ease, transform 0.5s ease',
        pointerEvents: scOverlayVisible ? 'auto' : 'none',
        ...scOverlayPositions[scOverlayPosition]
      });
      useEffect(() => {
        if (audioMode !== 'embed') {
          setScOverlayVisible(false);
          return undefined;
        }
        let cancelled = false;
        let timeoutId = null;
        const positions = ['bottom-right', 'top-right', 'bottom-left'];
        const scheduleOverlay = () => {
          if (cancelled) return;
          const show = Math.random() > 0.35;
          setScOverlayVisible(show);
          setScOverlayPosition(positions[Math.floor(Math.random() * positions.length)]);
          const nextDelay = 3600 + Math.random() * 6200;
          timeoutId = window.setTimeout(scheduleOverlay, nextDelay);
        };
        scheduleOverlay();
        return () => {
          cancelled = true;
          if (timeoutId) window.clearTimeout(timeoutId);
        };
      }, [audioMode, currentTrack]);
      const fontFamilyStack = {
        'Inter': 'Inter, ui-sans-serif, system-ui, sans-serif',
        'Orbitron': 'Orbitron, ui-sans-serif, system-ui, sans-serif',
        'Exo 2': 'Exo 2, ui-sans-serif, system-ui, sans-serif',
        'Saira Condensed': 'Saira Condensed, ui-sans-serif, system-ui, sans-serif',
        'Audiowide': 'Audiowide, ui-sans-serif, system-ui, sans-serif',
        'Fira Code': 'Fira Code, ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace',
        'JetBrains Mono': 'JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace',
        'VT323': 'VT323, ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace',
        'Share Tech Mono': 'Share Tech Mono, ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace'
      };
      const accentPalette = {
        'toxic-green': { bg: '#07080f', accent: '#6cffb8', alt: '#ff7e18' },
        'neon-orange': { bg: '#09070d', accent: '#ff8c3d', alt: '#6bff9e' }
      };

      const COLOR_SCHEMES = {
        'Cyber': { bg: '#05080f', accent: '#6cffb8', alt: '#ff7e18', glow: '#6cffb8' },
        'Void': { bg: '#070612', accent: '#8ab4ff', alt: '#b28cff', glow: '#8ab4ff' },
        'Acid': { bg: '#081006', accent: '#b7ff4d', alt: '#00ffd1', glow: '#b7ff4d' },
        'Blood': { bg: '#12060a', accent: '#ff5a7a', alt: '#ffb86b', glow: '#ff5a7a' }
      };

      const setStatusMessage = (text) => {
        setStatus(text);
      };

      const loadPresetSlot = (slot) => {
        const saved = JSON.parse(localStorage.getItem('vj-presets') || '[]');
        if (saved[slot]) {
          const settings = saved[slot];
          setSelectedStyle(settings.selectedStyle);
          setActiveEffects(settings.activeEffects);
          setAnimationSettings(settings.animationSettings || animationSettings);
          setSelectedFont(settings.selectedFont || selectedFont);
          setFrameRate(settings.frameRate);
          setTrackTicker(settings.trackTicker);
          setCurrentTrack(settings.currentTrack);
          setLogoMeta(settings.logoMeta);
          setBandSettings(settings.bandSettings);
          setBpmState(settings.bpmState);
          setFxParams(settings.fxParams || fxParams);
          setStatusMessage(`Loaded preset ${slot + 1}: ${settings.label}`);
        } else {
          setStatusMessage(`Preset ${slot + 1} is empty.`);
        }
      };

      const savePresetSlot = (slot) => {
        const saved = JSON.parse(localStorage.getItem('vj-presets') || '[]');
        saved[slot] = {
          label: presets[slot].label,
          selectedStyle,
          activeEffects,
          animationSettings,
          selectedFont,
          frameRate,
          trackTicker,
          currentTrack,
          logoMeta,
          bandSettings,
          fxParams,
          bpmState
        };
        localStorage.setItem('vj-presets', JSON.stringify(saved));
        const updated = presets.slice();
        updated[slot] = { ...updated[slot], settings: saved[slot] };
        setPresets(updated);
        setStatusMessage(`Saved preset ${slot + 1}: ${updated[slot].label}`);
      };

      const exportPresets = () => {
        try {
          const data = localStorage.getItem('vj-presets') || '[]';
          const blob = new Blob([data], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'vj-presets.json';
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(url);
          setStatusMessage('Presets exported to vj-presets.json');
        } catch (e) {
          console.warn(e);
          setStatusMessage('Export failed.');
        }
      };

      const handleImportPresetsFile = (event) => {
        const file = event.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const json = ev.target.result;
            const parsed = JSON.parse(json);
            localStorage.setItem('vj-presets', JSON.stringify(parsed));
            setPresets((prev) => prev.map((p, i) => ({ ...p, settings: (parsed[i] || {}).settings || (prev[i] && prev[i].settings) })));
            setStatusMessage('Presets imported successfully.');
          } catch (err) {
            console.warn(err);
            setStatusMessage('Failed to import presets: invalid JSON.');
          }
        };
        reader.readAsText(file);
      };

      const handleLogoUpload = async (file) => {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (event) => {
          const dataUrl = event.target.result;
          setLogoData(dataUrl);
          await saveLogoImage(dataUrl);
          setStatusMessage('DJ logo stored in IndexedDB and ready.');
        };
        reader.readAsDataURL(file);
      };

      const loadStoredLogo = async () => {
        const stored = await loadLogoImage();
        if (stored) {
          setLogoData(stored);
          setStatusMessage('Cached logo loaded from IndexedDB.');
        }
      };

      const teardownAudio = () => {
        if (audioContextRef.current) {
          audioContextRef.current.close().catch(() => {});
          audioContextRef.current = null;
          analyserRef.current = null;
          sourceRef.current = null;
        }
      };

      const createAudioGraph = async () => {
        try {
          teardownAudio();
          const context = new (window.AudioContext || window.webkitAudioContext)();
          const analyser = context.createAnalyser();
          analyser.fftSize = 2048;
          analyser.smoothingTimeConstant = 0.85;
          const sourceNode = audioRef.current;

          if (audioMode === 'microphone') {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            sourceRef.current = context.createMediaStreamSource(stream);
            sourceRef.current.connect(analyser);
            analyser.connect(context.destination);
            setStatusMessage('Microphone input active.');
          } else if (audioMode === 'embed') {
            // When using an embedded SoundCloud widget (cross-origin iframe) we cannot
            // access the raw audio for WebAudio analysis. Inform the user and skip analyzer.
            audioContextRef.current = null;
            analyserRef.current = null;
            dataRef.current = null;
            setStatusMessage('Embedded SoundCloud player active — audio analyzer unavailable for cross-origin embeds.');
            return;
          } else {
            if (!sourceNode) return;
            analyser.disconnect();
            sourceRef.current = context.createMediaElementSource(sourceNode);
            sourceRef.current.connect(analyser);
            analyser.connect(context.destination);
            sourceNode.loop = true;
            try { await sourceNode.play(); } catch (err) {
              console.warn(err);
            }
            setStatusMessage('Audio source ready.');
          }
          audioContextRef.current = context;
          analyserRef.current = analyser;
          dataRef.current = new Uint8Array(analyser.frequencyBinCount);
        } catch (err) {
          console.warn(err);
          setStatusMessage('Audio engine could not connect. Check mic permission or audio source.');
        }
      };

      useEffect(() => {
        loadStoredLogo();

        const handleKey = (event) => {
          if (event.key === 'f' || event.key === 'F') {
            if (!document.fullscreenElement) {
              document.documentElement.requestFullscreen();
              setFullscreen(true);
            } else {
              document.exitFullscreen();
              setFullscreen(false);
            }
          }
          if (event.key === ' ') {
            event.preventDefault();
            setPaused((value) => !value);
          }
          if (event.key === 'Escape') {
            setUiVisible(true);
          }
        };
        window.addEventListener('keydown', handleKey);
        return () => window.removeEventListener('keydown', handleKey);
      }, []);

      useEffect(() => {
        createAudioGraph();
        return () => teardownAudio();
      }, [audioMode, audioFileUrl, audioUrl]);

      useEffect(() => {
        let lastTick = performance.now();
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');

        const resize = () => {
          const parent = canvas.parentElement;
          if (!parent) return;
          const { width, height } = parent.getBoundingClientRect();
          const dpr = window.devicePixelRatio || 1;
          canvas.width = Math.floor(width * dpr);
          canvas.height = Math.floor(height * dpr);
          canvas.style.width = `${Math.floor(width)}px`;
          canvas.style.height = `${Math.floor(height)}px`;
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        };

        resize();
        window.addEventListener('resize', resize);

        const drawScene = (time) => {
          const width = canvas.clientWidth;
          const height = canvas.clientHeight;
          const now = time / 1000;
          ctx.clearRect(0, 0, width, height);
          ctx.save();

          const accent = activeColors || accentPalette[themeAccent] || accentPalette['toxic-green'];
          const hexToRgba = (hex, a) => {
            const h = hex.replace('#','');
            const bigint = parseInt(h.length===3?h.split('').map(c=>c+c).join(''):h,16);
            const r = (bigint >> 16) & 255;
            const g = (bigint >> 8) & 255;
            const b = bigint & 255;
            return `rgba(${r},${g},${b},${a})`;
          };
          const fontFamily = fontFamilyStack[selectedFont] || fontFamilyStack.Inter;
          const pulseFactor = activeEffects.pulse ? 0.82 + Math.sin(now * 2.6) * 0.18 : 1;
          const motionDrift = animationSettings.backgroundDrift ? Math.sin(now * 0.36) * 0.15 : 0;
          const textFit = (text, maxWidth, maxSize, minSize, weight) => {
            let size = maxSize;
            do {
              ctx.font = `${weight} ${size}px ${fontFamily}`;
              if (ctx.measureText(text).width <= maxWidth) break;
              size -= 1;
            } while (size >= minSize);
            return Math.max(size, minSize);
          };
          const wrapText = (text, maxWidth, size, weight) => {
            ctx.font = `${weight} ${size}px ${fontFamily}`;
            const words = text.split(' ');
            const lines = [];
            let current = '';
            for (const word of words) {
              const candidate = current ? `${current} ${word}` : word;
              if (ctx.measureText(candidate).width <= maxWidth) {
                current = candidate;
              } else {
                if (current) lines.push(current);
                current = word;
              }
            }
            if (current) lines.push(current);
            return lines.slice(0, 2);
          };

          const bassTarget = analyserRef.current ? averageFrequency(dataRef.current, SAMPLE_RATE, ...BAND_RANGES.bass) : 0;
          const midTarget = analyserRef.current ? averageFrequency(dataRef.current, SAMPLE_RATE, ...BAND_RANGES.mid) : 0;
          const highTarget = analyserRef.current ? averageFrequency(dataRef.current, SAMPLE_RATE, ...BAND_RANGES.high) : 0;

          const smoothValue = (current, target, enabled) => enabled ? current * 0.82 + target * 0.18 : target;
          const bass = smoothValue(bandStateRef.current.bass, bassTarget * bandSettings.bass, bandSettings.bassSmooth);
          const mid = smoothValue(bandStateRef.current.mid, midTarget * bandSettings.mid, bandSettings.midSmooth);
          const high = smoothValue(bandStateRef.current.high, highTarget * bandSettings.high, bandSettings.highSmooth);
          bandStateRef.current = { bass, mid, high };
          if (performance.now() - fpsTimerRef.current > 120) {
            setDispBandLevels({ bass, mid, high });
            fpsTimerRef.current = performance.now();
          }

          const intensity = bass * 1.2;
          const rotationOffset = now * (0.4 + mid * 1.6);
          const particleAlpha = clamp(0.16 + high * 0.28, 0.16, 0.85);

          const flashAlpha = activeEffects.strobe ? clamp(Math.sin(now * (bpmState.autoStrobe ? bpmState.bpm / 60 : bpmState.bpm / 60) * Math.PI) * 0.5 + 0.5, 0, 1) * strobeStrength : 0;

          const drawFlash = () => {
            if (!activeEffects.strobe) return;
            ctx.save();
            ctx.fillStyle = `rgba(255,255,255,${flashAlpha * 0.06})`;
            ctx.fillRect(0, 0, width, height);
            ctx.restore();
          };

          const drawBackground = () => {
            if (selectedStyle === 'External Media') {
              if (backgroundImageUrl && backgroundImageRef.current) {
                ctx.drawImage(backgroundImageRef.current, 0, 0, width, height);
                return;
              }
              if (videoRef.current && videoRef.current.readyState >= 2) {
                ctx.drawImage(videoRef.current, 0, 0, width, height);
                return;
              }
            }
            if (selectedStyle === 'Hypnotic Tunnel') {
              const columns = 14;
